name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - helm/**

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push to gh-pages branch and create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # chart-releaser needs full history to detect changes

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: .   # finds helm/ as a chart directory (contains Chart.yaml)
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
