# ── Bare-metal k3s — DaemonSet + hostPorts ────────────────────────────────────
# Traffic arrives directly on each node's port 80/443. No load balancer needed.
# Real client IP is preserved natively (no trusted_proxies adjustment required
# beyond the pod CIDR for internal cluster traffic).
#
# Usage:
#   helm install caddy caddy-custom/caddy -n caddy --create-namespace -f baremetal.yaml

k8sIngress:
  enabled: true
  ingressClass: caddy-custom

workloadType: DaemonSet
hostPorts:
  enabled: true
  http: 80
  https: 443

tls:
  certManagerCSI:
    issuerName: letsencrypt-prod
    issuerKind: ClusterIssuer

realIP:
  trustedProxies:
    - 10.42.0.0/16   # k3s default pod CIDR
    - 127.0.0.1/32
